<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1035;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />
  
  <!-- Outer glowing rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="6" />

  <!-- Double Cards (Swipe Simulation symbol) -->
  <g transform="translate(256, 256) rotate(-10)" filter="url(#glow)">
    <!-- Back Card -->
    <rect x="-90" y="-120" width="160" height="220" rx="20" fill="rgba(255, 255, 255, 0.15)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="2" transform="translate(20, 10) rotate(15)" />
    <!-- Front Card -->
    <rect x="-90" y="-120" width="160" height="220" rx="20" fill="#14161d" stroke="url(#accentGrad)" stroke-width="4" />
    
    <!-- Heart / Flame Swipe Symbol inside Front Card -->
    <path d="M 0 -40 C -15 -60, -35 -60, -35 -30 C -35 0, 0 25, 0 35 C 0 25, 35 0, 35 -30 C 35 -60, 15 -60, 0 -40 Z" fill="url(#accentGrad)" transform="scale(0.8)" />
  </g>
</svg>
